<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main">
      <!-- <nav></nav> -->
      <section class="all-Elements">
        <div class="todo elements" id="0">
          <img src="./backgrounds/bg1.avif" alt="" />
          <h2>To Do List</h2>
        </div>
        <div class="daily elements" id="1">
          <img src="./backgrounds/bg2.avif" alt="" />
          <h2>Daily Planner</h2>
        </div>
        <div class="motivation elements" id="2">
          <img src="./backgrounds/bg3.avif" alt="" />
          <h2>Motivation</h2>
        </div>
        <div class="pomodoro elements" id="3">
          <img src="./backgrounds/bg4.avif" alt="" />
          <h2>Pomodoro Timer</h2>
        </div>
        <div class="goals elements" id="4">
          <img src="./backgrounds/bg5.avif" alt="" />
          <h2>Daily Goals</h2>
        </div>
      </section>

      <section class="fullElem todo-list-fullpage">
        <button class="back" id="0">Close</button>
        <h2>Your Personalised Task List</h2>

        <div class="todo-container">
          <div class="addTask">
            <form>
              <input type="text" placeholder="Enter Task" />
              <textarea
                placeholder="Enter Details"
                cols="30"
                rows="10"
              ></textarea>
              <button>Add Task</button>
            </form>
          </div>
          <div class="allTask">
            <div class="task">
              <h5>Go to Gym</h5>
              <button>Mark as Completed</button>
            </div>
            
          </div>
        </div>
      </section>
      <section class="fullElem daily-planner-fullpage">
        <button class="back" id="1">Close</button>
        <h1>Daily Planner</h1>
      </section>
      <section class="fullElem motivational-fullpage">
        <button class="back" id="2">Close</button>
        <h1>Motivational Quote</h1>
      </section>
      <section class="fullElem pomodoro-fullpage">
        <button class="back" id="3">Close</button>
        <h1>Pomodoro Timer</h1>
      </section>
      <section class="fullElem daily-goals-fullpage">
        <button class="back" id="4">Close</button>
        <h1>Daily Goals</h1>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
